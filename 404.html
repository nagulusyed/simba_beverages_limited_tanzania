<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html,body{font-family:'Inter',sans-serif;background:var(--black);color:var(--cream);overflow-x:hidden;line-height:1.6}

.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-mark{width:46px;height:46px;flex-shrink:0}
.btn{display:inline-block;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:none;transition:background .2s,transform .1s,color .2s}
.btn-primary{font-size:14px;padding:13px 32px;background:var(--gold);color:var(--black);clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%)}
.btn-primary:hover{background:var(--gold-light)}

.not-found-section{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:2rem;}
.hero-bg{position:absolute;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 70% at 78% 50%,rgba(245,166,35,.09) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 18% 80%,rgba(74,124,63,.06) 0%,transparent 50%),linear-gradient(160deg,#0D0A06 0%,#1A0F02 55%,#0D0A06 100%)}
.hero-kilimanjaro{position:absolute;top:0;right:0;width:52%;height:100%;z-index:2;clip-path:polygon(28% 100%,62% 0%,100% 100%);background:linear-gradient(135deg,rgba(245,166,35,.06) 0%,transparent 65%)}
.hero-silhouette{position:absolute;bottom:0;left:0;right:0;height:200px;opacity:.14;z-index:2}

.content-404{position:relative;z-index:3;max-width:600px;}
.title-404{font-family:'Oswald',sans-serif;font-size:clamp(4rem,10vw,8rem);font-weight:700;color:var(--gold);line-height:1;margin-bottom:1rem;}
.subtitle-404{font-family:'Playfair Display',serif;font-style:italic;font-size:2rem;color:var(--white);margin-bottom:1.5rem;}
.desc-404{color:var(--cream-muted);margin-bottom:2.5rem;font-size:1.1rem;}

/* WhatsApp Float (Simplified for 404) */
.wa-float{
  position:fixed;bottom:30px;right:30px;z-index:1000;
  width:56px;height:56px;background:#25D366;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.4);text-decoration:none;
  transition:transform .2s,box-shadow .2s;
}
.wa-float:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,.55)}
.wa-float svg{width:30px;height:30px;fill:white}
